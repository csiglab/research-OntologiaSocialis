<!DOCTYPE html>
<html lang="en" data-theme="intelligence-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firm Intelligence Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void: #0a0b0d;
      --bg-primary: #121317;
      --bg-secondary: #1a1b20;
      --bg-tertiary: #22242a;
      --bg-elevated: #2a2d35;
      --bg-hover: #32363f;
      
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-tertiary: #5f6368;
      
      --accent-primary: #4f9eff;
      --accent-success: #34d399;
      --accent-warning: #fbbf24;
      --accent-danger: #f87171;
      --accent-info: #818cf8;
      
      --data-cyan: #22d3ee;
      --data-violet: #a78bfa;
      --data-amber: #fcd34d;
      --data-rose: #fb7185;
      --data-emerald: #34d399;
      --data-slate: #94a3b8;
      
      --font-display: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --font-data: 'DM Sans', sans-serif;
    }
    
    * {
      box-sizing: border-box;
    }
    
    body {
      font-family: var(--font-display);
      background: var(--bg-void);
      color: var(--text-primary);
      margin: 0;
      overflow: hidden;
    }
    
    .platform-shell {
      display: grid;
      grid-template-rows: 56px 1fr 72px;
      height: 100vh;
      background: var(--bg-void);
    }
    
    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    
    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }
    
    ::-webkit-scrollbar-thumb {
      background: var(--bg-elevated);
      border-radius: 3px;
    }
    
    ::-webkit-scrollbar-thumb:hover {
      background: var(--bg-hover);
    }
    
    /* Panel Intelligence */
    .panel-intelligence {
      background: linear-gradient(145deg, rgba(26, 27, 32, 0.95) 0%, rgba(18, 19, 23, 0.98) 100%);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      backdrop-filter: blur(20px);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    
    /* Card Data */
    .card-data {
      background: var(--bg-tertiary);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .card-data:hover {
      border-color: var(--accent-primary);
      box-shadow: 0 0 20px rgba(79, 158, 255, 0.15);
    }
    
    /* Metric Value */
    .metric-value {
      font-family: var(--font-mono);
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, #9aa0a6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Header Styles */
    .intel-header {
      display: flex;
      align-items: center;
      padding: 0 20px;
      background: var(--bg-primary);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      gap: 24px;
    }
    
    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .platform-mark {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-primary), var(--data-violet));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .platform-title .title-main {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      display: block;
    }
    
    .platform-title .title-sub {
      font-size: 11px;
      color: var(--text-tertiary);
      display: block;
    }
    
    .header-context {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-left: 32px;
    }
    
    .firm-selector {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    
    .firm-selector:hover {
      background: var(--bg-tertiary);
      border-color: rgba(255, 255, 255, 0.1);
    }
    
    .firm-selector .firm-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      margin-right: 8px;
    }
    
    .firm-selector .firm-id {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }
    
    .temporal-context {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .temporal-mode {
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .temporal-range {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .range-divider {
      color: var(--text-tertiary);
      margin: 0 4px;
    }
    
    .header-nav {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }
    
    .nav-item {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      border: none;
      background: transparent;
    }
    
    .nav-item:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.04);
    }
    
    .nav-item.active {
      color: var(--accent-primary);
      background: rgba(79, 158, 255, 0.1);
    }
    
    .header-actions {
      display: flex;
      gap: 8px;
    }
    
    .action-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
    }
    
    .action-btn:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }
    
    /* Main Canvas */
    .intel-canvas {
      display: grid;
      grid-template-columns: 260px 1fr;
      background: var(--bg-void);
      overflow: hidden;
    }
    
    /* Navigation Rail */
    .nav-rail {
      background: var(--bg-primary);
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      overflow-y: auto;
      padding: 16px 12px;
    }
    
    .nav-tree {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .tree-domain {
      margin-bottom: 4px;
    }
    
    .domain-header {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 10px 12px;
      background: transparent;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s ease;
      color: var(--text-primary);
      text-align: left;
    }
    
    .domain-header:hover {
      background: rgba(255, 255, 255, 0.04);
    }
    
    .domain-icon {
      width: 16px;
      height: 16px;
      color: var(--accent-primary);
      margin-right: 10px;
      flex-shrink: 0;
    }
    
    .domain-label {
      flex: 1;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    
    .domain-badge {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-tertiary);
      margin-right: 8px;
      font-family: var(--font-mono);
    }
    
    .expand-icon {
      width: 14px;
      height: 14px;
      color: var(--text-tertiary);
      transition: transform 0.2s ease;
    }
    
    .tree-domain.expanded .expand-icon {
      transform: rotate(90deg);
    }
    
    .domain-children {
      margin: 0;
      padding: 0 0 0 24px;
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    
    .tree-domain.expanded .domain-children {
      max-height: 500px;
    }
    
    .nav-leaf {
      display: flex;
      align-items: center;
      height: 34px;
      padding: 0 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      margin: 2px 0;
    }
    
    .nav-leaf:hover {
      background: rgba(255, 255, 255, 0.04);
    }
    
    .nav-leaf.active {
      background: rgba(79, 158, 255, 0.12);
      border-left: 2px solid var(--accent-primary);
      margin-left: -2px;
    }
    
    .leaf-label {
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .nav-leaf.active .leaf-label {
      color: var(--text-primary);
      font-weight: 500;
    }
    
    /* Workspace */
    .workspace {
      display: flex;
      flex-direction: column;
      background: var(--bg-void);
      overflow: hidden;
    }
    
    .workspace-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      background: var(--bg-primary);
    }
    
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .breadcrumb .crumb {
      font-size: 13px;
      color: var(--text-tertiary);
    }
    
    .breadcrumb .crumb.active {
      color: var(--text-primary);
      font-weight: 500;
    }
    
    .breadcrumb .separator {
      color: var(--text-tertiary);
      opacity: 0.5;
    }
    
    .workspace-controls {
      display: flex;
      gap: 8px;
    }
    
    .control-btn {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    
    .control-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .workspace-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    
    /* Module Styles */
    .intel-module {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    
    .intel-module.active {
      display: block;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .module-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    
    .module-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
    }
    
    .module-subtitle {
      font-size: 13px;
      color: var(--text-tertiary);
      margin-top: 4px;
      display: block;
    }
    
    .module-section {
      margin-bottom: 32px;
    }
    
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    
    /* Identity Card */
    .identity-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 24px;
    }
    
    .identity-main {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
    }
    
    .firm-logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-elevated));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: var(--accent-primary);
    }
    
    .identity-info .firm-name {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    
    .firm-meta {
      display: flex;
      gap: 24px;
    }
    
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .meta-label {
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .meta-value {
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .identity-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .tag {
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-tertiary);
      border-radius: 4px;
    }
    
    .tag-primary {
      background: rgba(79, 158, 255, 0.15);
      color: var(--accent-primary);
    }
    
    .tag-secondary {
      background: rgba(129, 140, 248, 0.15);
      color: var(--accent-info);
    }
    
    /* Metrics Grid */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }
    
    .metric-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      padding: 16px;
      transition: all 0.2s ease;
    }
    
    .metric-card:hover {
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
    }
    
    .metric-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .metric-label {
      font-size: 12px;
      color: var(--text-tertiary);
    }
    
    .metric-trend {
      font-size: 11px;
      font-weight: 500;
      font-family: var(--font-mono);
    }
    
    .metric-trend.positive {
      color: var(--accent-success);
    }
    
    .metric-trend.negative {
      color: var(--accent-danger);
    }
    
    .metric-card .metric-value {
      font-size: 24px;
    }
    
    .metric-sparkline {
      height: 32px;
      margin-top: 12px;
    }
    
    /* Regions Visualization */
    .regions-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .region-item {
      display: grid;
      grid-template-columns: 28px 140px 1fr 48px;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-radius: 8px;
    }
    
    .region-flag {
      font-size: 20px;
    }
    
    .region-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .region-coverage {
      font-size: 11px;
      color: var(--text-tertiary);
    }
    
    .region-bar {
      height: 4px;
      background: var(--bg-tertiary);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .region-bar .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-primary), var(--data-cyan));
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    
    .region-value {
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text-secondary);
      text-align: right;
    }
    
    /* Strategic Card */
    .strategic-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      padding: 20px;
    }
    
    .strategic-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-secondary);
      margin: 0 0 16px 0;
    }
    
    .strategic-focus {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .focus-label {
      font-size: 12px;
      color: var(--text-tertiary);
    }
    
    .focus-tag {
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--data-amber);
      background: rgba(252, 211, 77, 0.1);
      border-radius: 4px;
    }
    
    /* Evolution Timeline */
    .evolution-timeline {
      position: relative;
      padding: 32px 0;
    }
    
    .timeline-track {
      position: relative;
    }
    
    .track-years {
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    
    .year-marker {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }
    
    .track-events {
      position: relative;
      height: 120px;
      background: linear-gradient(90deg, rgba(79, 158, 255, 0.05), rgba(129, 140, 248, 0.05));
      border-radius: 8px;
    }
    
    .event-node {
      position: absolute;
      top: 50%;
      transform: translateX(-50%) translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
    }
    
    .node-marker {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent-primary);
      border: 3px solid var(--bg-void);
      box-shadow: 0 0 12px rgba(79, 158, 255, 0.4);
      transition: all 0.2s ease;
    }
    
    .event-node:hover .node-marker {
      transform: scale(1.3);
    }
    
    .node-card {
      position: absolute;
      top: -60px;
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s ease;
      pointer-events: none;
    }
    
    .event-node:hover .node-card {
      opacity: 1;
      transform: translateY(0);
    }
    
    .node-year {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--accent-primary);
      display: block;
    }
    
    .node-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .node-type {
      font-size: 10px;
      color: var(--text-tertiary);
    }
    
    /* Stack Evolution */
    .stack-evolution {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .evolution-stream {
      background: var(--bg-secondary);
      border-radius: 10px;
      padding: 16px;
    }
    
    .stream-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .stream-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .stream-events {
      font-size: 11px;
      color: var(--text-tertiary);
    }
    
    .stream-timeline {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .stream-layer {
      display: grid;
      grid-template-columns: 100px 1fr 80px;
      gap: 16px;
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border-radius: 6px;
      align-items: center;
      opacity: 0.6;
    }
    
    .stream-layer.active {
      opacity: 1;
      background: rgba(79, 158, 255, 0.08);
      border-left: 2px solid var(--accent-primary);
    }
    
    .layer-period {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }
    
    .layer-tech {
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .layer-status {
      font-size: 10px;
      color: var(--text-tertiary);
      text-align: right;
    }
    
    .stream-layer.active .layer-tech {
      color: var(--text-primary);
    }
    
    /* Intelligence Alerts */
    .intelligence-alerts {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .alert-card {
      display: flex;
      gap: 16px;
      padding: 16px;
      background: var(--bg-secondary);
      border-radius: 10px;
      border-left: 3px solid;
    }
    
    .alert-card[data-severity="major"] {
      border-left-color: var(--accent-warning);
    }
    
    .alert-card[data-severity="moderate"] {
      border-left-color: var(--accent-primary);
    }
    
    .alert-card[data-severity="minor"] {
      border-left-color: var(--data-slate);
    }
    
    .alert-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-warning);
      margin-top: 6px;
      flex-shrink: 0;
    }
    
    .alert-card[data-severity="moderate"] .alert-indicator {
      background: var(--accent-primary);
    }
    
    .alert-card[data-severity="minor"] .alert-indicator {
      background: var(--data-slate);
    }
    
    .alert-type {
      font-size: 10px;
      color: var(--accent-warning);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      display: block;
    }
    
    .alert-card[data-severity="moderate"] .alert-type {
      color: var(--accent-primary);
    }
    
    .alert-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    
    .alert-date {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      margin-bottom: 8px;
      display: block;
    }
    
    .alert-description {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin: 0 0 12px 0;
    }
    
    .alert-impact {
      font-size: 12px;
    }
    
    .impact-label {
      color: var(--text-tertiary);
    }
    
    .impact-value {
      color: var(--text-primary);
      font-weight: 500;
    }
    
    .impact-value.positive {
      color: var(--accent-success);
    }
    
    /* Categories Matrix */
    .categories-matrix {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    
    .category-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .category-card:hover {
      border-color: var(--accent-primary);
      transform: translateY(-2px);
    }
    
    .category-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .category-icon {
      width: 40px;
      height: 40px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-primary);
    }
    
    .category-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .category-revenue {
      font-size: 12px;
      color: var(--text-tertiary);
    }
    
    .category-stats {
      display: flex;
      gap: 24px;
      margin-bottom: 12px;
    }
    
    .category-stats .stat-value {
      font-size: 18px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text-primary);
    }
    
    .category-stats .stat-label {
      font-size: 11px;
      color: var(--text-tertiary);
    }
    
    .category-share {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .share-label {
      font-size: 11px;
      color: var(--text-tertiary);
    }
    
    .share-bar {
      flex: 1;
      height: 4px;
      background: var(--bg-tertiary);
      border-radius: 2px;
      overflow: hidden;
    }
    
    .share-bar .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-primary), var(--data-cyan));
    }
    
    .share-value {
      font-size: 12px;
      font-family: var(--font-mono);
      color: var(--text-secondary);
    }
    
    /* Org Chart */
    .org-chart-container {
      overflow-x: auto;
    }
    
    .org-chart {
      min-width: 800px;
    }
    
    .chart-level {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 32px;
      position: relative;
    }
    
    .chart-node {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      padding: 16px;
      min-width: 180px;
    }
    
    .node-executive {
      background: linear-gradient(135deg, rgba(79, 158, 255, 0.1), rgba(129, 140, 248, 0.1));
      border-color: rgba(79, 158, 255, 0.2);
    }
    
    .node-division {
      flex: 1;
    }
    
    .node-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .node-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .node-headcount {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }
    
    .node-head {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .node-children {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    
    .child-unit {
      padding: 3px 8px;
      font-size: 10px;
      color: var(--text-tertiary);
      background: var(--bg-tertiary);
      border-radius: 4px;
    }
    
    /* Capital Overview */
    .capital-overview {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 24px;
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 24px;
    }
    
    .overview-metric.primary {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .overview-metric .metric-label {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 8px;
    }
    
    .overview-metric .metric-value {
      font-size: 36px;
      margin-bottom: 8px;
    }
    
    .metric-change {
      font-size: 12px;
      font-family: var(--font-mono);
    }
    
    .metric-change.positive {
      color: var(--accent-success);
    }
    
    .overview-breakdown {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .breakdown-item {
      display: grid;
      grid-template-columns: 120px 1fr 48px;
      gap: 16px;
      align-items: center;
    }
    
    .item-label {
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .item-value {
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-mono);
      color: var(--text-primary);
      text-align: right;
    }
    
    .item-bar {
      height: 8px;
      background: var(--bg-tertiary);
      border-radius: 4px;
      overflow: hidden;
    }
    
    .item-bar .bar-fill.equity {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-primary), var(--data-cyan));
    }
    
    .item-bar .bar-fill.debt {
      height: 100%;
      background: linear-gradient(90deg, var(--data-violet), var(--data-rose));
    }
    
    .item-percent {
      font-size: 13px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
    }
    
    /* Capability Radar */
    .capability-radar {
      display: flex;
      gap: 40px;
      align-items: center;
    }
    
    .radar-chart {
      width: 300px;
      height: 300px;
      position: relative;
    }
    
    .radar-svg {
      width: 100%;
      height: 100%;
    }
    
    .radar-legend {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }
    
    .legend-color.firm {
      background: var(--accent-primary);
    }
    
    .legend-color.industry {
      background: var(--data-slate);
    }
    
    .legend-color.leader {
      background: var(--data-emerald);
    }
    
    .legend-label {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    /* Dimensions Grid */
    .dimensions-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    
    .dimension-card {
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      padding: 20px;
    }
    
    .dimension-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .dimension-icon {
      width: 32px;
      height: 32px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-primary);
    }
    
    .dimension-name {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .dimension-score {
      font-size: 14px;
      font-family: var(--font-mono);
      font-weight: 600;
    }
    
    .dimension-score.high {
      color: var(--accent-success);
    }
    
    .dimension-score.medium {
      color: var(--accent-warning);
    }
    
    .dimension-details {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .capability-item {
      display: grid;
      grid-template-columns: 140px 1fr 40px;
      gap: 12px;
      align-items: center;
    }
    
    .capability-name {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .capability-bar {
      height: 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .capability-bar .bar-fill {
      height: 100%;
      background: var(--accent-primary);
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    
    .capability-value {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-tertiary);
      text-align: right;
    }
    
    .dimension-insight {
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }
    
    .insight-label {
      font-size: 11px;
      color: var(--text-tertiary);
    }
    
    .insight-text {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    /* Temporal Bar */
    .temporal-bar {
      background: var(--bg-primary);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      padding: 0 24px;
    }
    
    .timeline-container {
      display: flex;
      align-items: center;
      gap: 24px;
      width: 100%;
    }
    
    .timeline-controls {
      display: flex;
      gap: 8px;
    }
    
    .tl-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      font-size: 12px;
    }
    
    .tl-btn:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    
    .tl-btn.play {
      width: 40px;
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: var(--bg-void);
    }
    
    .tl-btn.play:hover {
      background: #6eb0ff;
    }
    
    .timeline-track-main {
      flex: 1;
      position: relative;
      height: 40px;
    }
    
    .track-viewport {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      height: 8px;
      background: var(--bg-secondary);
      border-radius: 4px;
      cursor: pointer;
    }
    
    .track-progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 65%;
      background: linear-gradient(90deg, var(--accent-primary), var(--data-violet));
      border-radius: 4px;
    }
    
    .track-handle {
      position: absolute;
      top: 50%;
      left: 65%;
      transform: translate(-50%, -50%);
      width: 16px;
      height: 16px;
      background: var(--text-primary);
      border-radius: 50%;
      cursor: grab;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    
    .timeline-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .current-year {
      font-size: 20px;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--text-primary);
    }
    
    /* Ownership Treemap */
    .ownership-treemap {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
      height: 200px;
    }
    
    .owner-block {
      border-radius: 6px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .owner-block:hover {
      transform: scale(1.02);
    }
    
    .owner-block:nth-child(1) {
      background: rgba(34, 211, 238, 0.2);
      grid-column: span 2;
    }
    
    .owner-block:nth-child(2) {
      background: rgba(167, 139, 250, 0.2);
      grid-column: span 2;
    }
    
    .owner-block:nth-child(3) {
      background: rgba(52, 211, 153, 0.2);
    }
    
    .owner-block:nth-child(4) {
      background: rgba(252, 211, 77, 0.2);
    }
    
    .owner-block:nth-child(5) {
      background: rgba(148, 163, 184, 0.2);
    }
    
    .owner-block:nth-child(6) {
      background: rgba(251, 113, 133, 0.2);
    }
    
    .owner-name {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
    }
    
    .owner-share {
      font-size: 18px;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--text-primary);
    }
    
    /* Data Table */
    .intel-table {
      width: 100%;
      border-collapse: collapse;
    }
    
    .intel-table th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: var(--bg-tertiary);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    
    .intel-table td {
      padding: 14px 16px;
      font-size: 13px;
      color: var(--text-secondary);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    
    .intel-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }
    
    .intel-table .col-product {
      font-weight: 500;
      color: var(--text-primary);
    }
    
    .stage-badge {
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 500;
      border-radius: 4px;
    }
    
    .stage-badge.mature {
      background: rgba(148, 163, 184, 0.2);
      color: var(--data-slate);
    }
    
    .stage-badge.growth {
      background: rgba(52, 211, 153, 0.2);
      color: var(--data-emerald);
    }
    
    .stage-badge.emerging {
      background: rgba(252, 211, 77, 0.2);
      color: var(--data-amber);
    }
    
    .col-growth.positive {
      color: var(--accent-success);
    }
    
    .col-growth.negative {
      color: var(--accent-danger);
    }
    
    /* Charts Container */
    .chart-container {
      background: var(--bg-secondary);
      border-radius: 10px;
      padding: 20px;
      min-height: 200px;
    }
    
    /* Responsive */
    @media (max-width: 1024px) {
      .metrics-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .categories-matrix {
        grid-template-columns: 1fr;
      }
      
      .dimensions-grid {
        grid-template-columns: 1fr;
      }
      
      .capital-overview {
        grid-template-columns: 1fr;
      }
    }
    
    @media (max-width: 768px) {
      .intel-canvas {
        grid-template-columns: 1fr;
      }
      
      .nav-rail {
        display: none;
      }
      
      .metrics-grid {
        grid-template-columns: 1fr;
      }
    }
    
    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

            </svg>
          </button>
          <ul class="domain-children">
            ${domain.children.map(child => `
              <li class="nav-leaf ${child.id === currentView ? 'active' : ''}" 
                  data-view="${child.id}" 
                  onclick="navigateTo('${child.id}', '${child.label}')">
                <span class="leaf-label">${child.label}</span>
              </li>
            `).join('')}
          </ul>
        </div>
      `).join('');
    }

    // Toggle Domain
    function toggleDomain(domainId) {
      const domain = document.querySelector(`[data-domain="${domainId}"]`);
      domain.classList.toggle('expanded');
    }

    // Navigate
    function navigateTo(viewId, label) {
      currentView = viewId;
      
      // Update nav
      document.querySelectorAll('.nav-leaf').forEach(leaf => {
        leaf.classList.toggle('active', leaf.dataset.view === viewId);
      });
      
      // Update breadcrumb
      document.getElementById('breadcrumbActive').textContent = label;
      
      // Render module
      renderModule(viewId);
    }

      const renderFn = modules[viewId] || renderOverviewModule;
      content.innerHTML = renderFn();

                <div class="legend-item">
                  <span class="legend-color leader"></span>
                  <span class="legend-label">Industry Leader</span>
                </div>
              </div>
            </div>
          </div>

          <div class="module-section">
            <h3 class="section-title">Capability Dimensions</h3>
            <div class="dimensions-grid">
              ${capabilitiesData.map(cap => `
                <div class="dimension-card">
                  <div class="dimension-header">
                    <div class="dimension-icon">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                      </svg>
                    </div>
                    <span class="dimension-name">${cap.name}</span>
                    <span class="dimension-score ${cap.scoreClass}">${cap.score}</span>
                  </div>
                  <div class="dimension-details">
                    ${cap.items.map(item => `
                      <div class="capability-item">
                        <span class="capability-name">${item.name}</span>
                        <div class="capability-bar">
                          <div class="bar-fill" style="width: ${item.value}%"></div>
                        </div>
                        <span class="capability-value">${item.value}%</span>
                      </div>
                    `).join('')}
                  </div>
                  <div class="dimension-insight">
                    <span class="insight-label">Key Focus:</span>
                    <span class="insight-text">${cap.insight}</span>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </section>
      `;
    }

    function renderTechEvolutionModule() {
      return `
        <section class="intel-module active" data-module="technical-evolution">
          <div class="module-section">
            <h3 class="section-title">Technology Evolution Timeline</h3>
            <div class="evolution-timeline">
              <div class="timeline-track">
                <div class="track-years">
                  <span class="year-marker">1998</span>
                  <span class="year-marker">2005</span>
                  <span class="year-marker">2010</span>
                  <span class="year-marker">2015</span>
                  <span class="year-marker">2020</span>
                  <span class="year-marker">2024</span>
                </div>
                <div class="track-events">
                  ${evolutionEvents.map(event => `
                    <div class="event-node" style="--position: ${event.position}%; left: ${event.position}%;">
                      <div class="node-marker"></div>
                      <div class="node-card">
                        <span class="node-year">${event.year}</span>
                        <span class="node-title">${event.title}</span>
                        <span class="node-type">${event.type}</span>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>

          <div class="module-section">
            <h3 class="section-title">Detected Structural Changes</h3>
            <div class="intelligence-alerts">
              ${alertsData.map(alert => `
                <div class="alert-card" data-severity="${alert.severity}">
                  <div class="alert-indicator"></div>
                  <div class="alert-content">
                    <span class="alert-type">${alert.type}</span>
                    <span class="alert-title">${alert.title}</span>
                    <span class="alert-date">${alert.date}</span>
                    <p class="alert-description">${alert.description}</p>
                    <div class="alert-impact">
                      <span class="impact-label">Impact:</span>
                      <span class="impact-value ${alert.impactPositive ? 'positive' : ''}">${alert.impact}</span>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </section>
      `;
    }

    function renderIndustryModule() {
      return `
        <section class="intel-module active" data-module="industry-profile">
          <div class="module-section">
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;">
              ${[
                { label: 'Global Market Size', value: '$1.2T', change: '+4.2% CAGR' },
                { label: 'Industry Growth', value: '4.2%', note: '5-year CAGR' },
                { label: 'Key Players', value: '847', note: 'Companies >$50M' },
                { label: 'Concentration', value: 'CR5: 32%', note: 'Moderately fragmented' }
              ].map(stat => `
                <div class="metric-card">
                  <span class="metric-label">${stat.label}</span>
                  <span class="metric-value" style="font-size: 24px; margin: 8px 0; display: block;">${stat.value}</span>
                  <span style="font-size: 11px; color: ${stat.change ? 'var(--accent-success)' : 'var(--text-tertiary)'};">${stat.change || stat.note}</span>
                </div>
              `).join('')}
            </div>
          </div>

          <div class="module-section">
            <h3 class="section-title">Competitive Landscape</h3>
            <div style="background: var(--bg-secondary); border-radius: 10px; padding: 20px;">
              <table class="intel-table">
                <thead>
                  <tr>
                    <th>Competitor</th>
                    <th>Revenue</th>
                    <th>Market Share</th>
                    <th>Main Segments</th>
                    <th>Position</th>
                  </tr>
                </thead>
                <tbody>
                  ${[
                    { name: 'Bosch', revenue: '€52.6B', share: '8.2%', segments: 'Powertrain, Electronics', position: 'Leader' },
                    { name: 'Continental', revenue: '€37.7B', share: '6.8%', segments: 'Tires, Electronics', position: 'Leader' },
                    { name: 'ZF Group', revenue: '€43.4B', share: '5.1%', segments: 'Powertrain, Chassis', position: 'Challenger' },
                    { name: 'Acme Industries', revenue: '€4.2B', share: '1.4%', segments: 'Powertrain, Chassis', position: 'Niche', isCurrent: true }
                  ].map(comp => `
                    <tr ${comp.isCurrent ? 'style="background: rgba(79, 158, 255, 0.08);"' : ''}>
                      <td style="font-weight: 500; color: var(--text-primary);">${comp.name}</td>
                      <td>${comp.revenue}</td>
                      <td style="font-family: var(--font-mono);">${comp.share}</td>
                      <td>${comp.segments}</td>
                      <td><span class="stage-badge ${comp.position === 'Leader' ? 'growth' : comp.position === 'Challenger' ? 'emerging' : 'mature'}">${comp.position}</span></td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </section>
      `;
    }

    function renderMarketsModule() {
      return `
        <section class="intel-module active" data-module="market-profile">
          <div class="module-section">
            <div style="display: flex; gap: 24px; align-items: center; background: var(--bg-secondary); border-radius: 12px; padding: 24px;">
              <div>
                <span class="metric-label">Total Addressable Market</span>
                <span class="metric-value" style="font-size: 36px; display: block;">$180B</span>
                <span style="font-size: 12px; color: var(--text-tertiary);">Served Markets</span>
              </div>
              <div style="flex: 1; display: flex; gap: 4px; height: 120px;">
                ${[
                  { pct: 38, color: 'var(--data-cyan)' },
                  { pct: 28, color: 'var(--data-violet)' },
                  { pct: 18, color: 'var(--data-emerald)' },
                  { pct: 12, color: 'var(--data-amber)' },
                  { pct: 4, color: 'var(--data-slate)' }
                ].map((seg, i) => `
                  <div style="flex: ${seg.pct}; background: ${seg.color}; opacity: ${0.4 + (i * 0.12)}; border-radius: 4px;"></div>
                `).join('')}
              </div>
            </div>
          </div>

          <div class="module-section">
            <h3 class="section-title">Geographic Markets</h3>
            <div class="regions-list">
              ${[
                { flag: 'EU', name: 'Europe', type: 'Primary Market', size: '$68B', revenue: '€1.9B', share: '2.8%', typeClass: 'primary' },
                { flag: 'US', name: 'North America', type: 'Secondary Market', size: '$72B', revenue: '€760M', share: '1.1%', typeClass: 'secondary' },
                { flag: 'CN', name: 'Asia Pacific', type: 'Growth Market', size: '$35B', revenue: '€85M', share: '0.2%', typeClass: 'growth' }
              ].map(market => `
                <div class="region-item" style="grid-template-columns: 32px 1fr 1fr 1fr 80px;">
                  <span class="region-flag">${getFlagEmoji(market.flag)}</span>
                  <div>
                    <span class="region-name">${market.name}</span>
                    <span class="region-coverage" style="color: var(--accent-${market.typeClass === 'primary' ? 'primary' : market.typeClass === 'growth' ? 'success' : 'info'});">${market.type}</span>
                  </div>
                  <div style="text-align: center;">
                    <span style="font-size: 10px; color: var(--text-tertiary);">Market Size</span>
                    <span style="display: block; font-family: var(--font-mono); color: var(--text-secondary);">${market.size}</span>
                  </div>
                  <div style="text-align: center;">
                    <span style="font-size: 10px; color: var(--text-tertiary);">Firm Revenue</span>
                    <span style="display: block; font-family: var(--font-mono); color: var(--text-secondary);">${market.revenue}</span>
                  </div>
                  <div style="text-align: right;">
                    <span style="font-size: 10px; color: var(--text-tertiary);">Share</span>
                    <span style="display: block; font-family: var(--font-mono); color: var(--text-primary); font-weight: 600;">${market.share}</span>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </section>
      `;
    }

    // Utility Functions
    function getFlagEmoji(code) {
      const flags = {
        'DE': 'DE',
        'FR': 'FR',
        'US': 'US',
        'CN': 'CN',
        'GB': 'UK',
        'EU': 'EU'
      };
      return `<span style="font-weight: 600; color: var(--text-tertiary); font-size: 12px;">${flags[code] || code}</span>`;
    }

    function generateHexagonPoints(cx, cy, r) {
      const points = [];
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 2;
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);
        points.push(`${x},${y}`);
      }
      return points.join(' ');
    }

    function generateDataPolygon(cx, cy, values) {
      const points = [];
      const maxR = 100;
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - Math.PI / 2;
        const r = (values[i] / 100) * maxR;
        const x = cx + r * Math.cos(angle);
        const y = cy + r * Math.sin(angle);
        points.push(`${x},${y}`);
      }
      return points.join(' ');
    }

    // Timeline
    function initializeTimeline() {
      const track = document.getElementById('timelineTrack');
      const handle = document.getElementById('timelineHandle');
      let isDragging = false;

      handle.addEventListener('mousedown', () => { isDragging = true; });
      
      document.addEventListener('mouseup', () => { isDragging = false; });
      
      track.addEventListener('click', (e) => {
        const rect = track.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        updateTimelinePosition(percent);
      });

      track.addEventListener('mousemove', (e) => {
        if (isDragging) {
          const rect = track.getBoundingClientRect();
          const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
          updateTimelinePosition(percent);
        }
      });
    }

    function updateTimelinePosition(percent) {
      const progress = document.querySelector('.track-progress');
      const handle = document.getElementById('timelineHandle');
      const yearDisplay = document.getElementById('currentYear');
      
      const startYear = 1998;
      const endYear = 2024;
      const currentYear = Math.round(startYear + percent * (endYear - startYear));
      
      progress.style.width = `${percent * 100}%`;
      handle.style.left = `${percent * 100}%`;
      yearDisplay.textContent = currentYear;
    }

    // Animations
    function initializeAnimations() {
      // Intersection Observer for scroll animations
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('animate-in');
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.metric-card, .category-card, .dimension-card, .alert-card').forEach(el => {
        observer.observe(el);
      });

      // Staggered entrance
      const cards = document.querySelectorAll('.metric-card, .category-card');
      cards.forEach((card, i) => {
        card.style.opacity = '0';
        card.style.transform = 'translateY(20px)';
        setTimeout(() => {
          card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
          card.style.opacity = '1';
          card.style.transform = 'translateY(0)';
        }, i * 80);
      });
    }

    // Header Navigation
    document.querySelectorAll('.header-nav .nav-item').forEach(item => {
      item.addEventListener('click', function() {
        document.querySelectorAll('.header-nav .nav-item').forEach(i => i.classList.remove('active'));
        this.classList.add('active');
      });
    });
  </script>
</body>
</html>
