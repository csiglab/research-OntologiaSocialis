<!DOCTYPE html>
<html lang="en" data-theme="intelligence-dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firm Intelligence Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<style>
    /* --- 1. Variables & Base --- */
    :root {
        /* Colors */
        --bg-void: #0a0b0d;
        --bg-primary: #121317;
        --bg-secondary: #1a1b20;
        --bg-tertiary: #22242a;
        --bg-elevated: #2a2d35;
        --bg-hover: #32363f;
        --text-primary: #e8eaed;
        --text-secondary: #9aa0a6;
        --text-tertiary: #5f6368;
        --accent-primary: #4f9eff;
        --accent-success: #34d399;
        --accent-warning: #fbbf24;
        --accent-danger: #f87171;
        --accent-info: #818cf8;
        --data-cyan: #22d3ee;
        --data-violet: #a78bfa;
        --data-amber: #fcd34d;

        /* Typography */
        --font-display: 'Inter', system-ui, sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
    }

    *,
    *::before,
    *::after {
        box-sizing: border-box;
    }

    body {
        font-family: var(--font-display);
        background: var(--bg-void);
        color: var(--text-primary);
        margin: 0;
        overflow: hidden;
    }

    /* --- 2. Layout Shell --- */
    .platform-shell {
        display: grid;
        grid-template-rows: 56px 1fr 72px;
        height: 100vh;
    }

    .intel-canvas {
        display: grid;
        grid-template-columns: 260px 1fr;
        height: 100%;
    }

    /* Shared Panel Styles (Header, Sidebar, Footer) */
    .intel-header,
    .nav-rail,
    .workspace-header,
    .temporal-bar {
        background: var(--bg-primary);
        border-color: rgba(255, 255, 255, 0.06);
    }

    .intel-header,
    .workspace-header {
        display: flex;
        align-items: center;
        padding: 0 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        gap: 24px;
    }

    .nav-rail {
        border-right: 1px solid rgba(255, 255, 255, 0.06);
        overflow-y: auto;
        padding: 16px 12px;
    }

    .workspace {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg-void);
    }

    .workspace-content {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
    }

    .temporal-bar {
        display: flex;
        align-items: center;
        padding: 0 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    /* --- 3. Navigation & UI Elements --- */
    .nav-tree {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    .tree-domain {
        margin-bottom: 4px;
    }

    .domain-header {
        display: flex;
        align-items: center;
        width: 100%;
        padding: 10px 12px;
        background: transparent;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        color: var(--text-primary);
        text-align: left;
    }

    .domain-header:hover {
        background: rgba(255, 255, 255, 0.04);
    }

    .domain-icon {
        width: 16px;
        height: 16px;
        color: var(--accent-primary);
        margin-right: 10px;
        flex-shrink: 0;
    }

    .domain-label {
        flex: 1;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }

    .domain-badge {
        font-size: 10px;
        color: var(--text-tertiary);
        margin-right: 8px;
        font-family: var(--font-mono);
    }

    .expand-icon {
        width: 14px;
        height: 14px;
        color: var(--text-tertiary);
        transition: transform 0.2s ease;
    }

    .tree-domain.expanded .expand-icon {
        transform: rotate(90deg);
    }

    .domain-children {
        margin: 0;
        padding: 0 0 0 24px;
        list-style: none;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
    }

    .tree-domain.expanded .domain-children {
        max-height: 500px;
    }

    /* Shared Interactive Button Styles */
    .nav-item,
    .nav-leaf,
    .control-btn,
    .tl-btn {
        font-weight: 500;
        color: var(--text-secondary);
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s ease;
        background: transparent;
        border: none;
    }

    .nav-item:hover,
    .nav-leaf:hover {
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-primary);
    }

    .nav-item.active,
    .nav-leaf.active {
        color: var(--accent-primary);
        background: rgba(79, 158, 255, 0.1);
    }

    .nav-item {
        padding: 8px 16px;
        font-size: 13px;
    }

    .nav-leaf {
        display: flex;
        align-items: center;
        height: 34px;
        padding: 0 12px;
        margin: 2px 0;
        font-size: 13px;
    }

    .nav-leaf.active {
        border-left: 2px solid var(--accent-primary);
        margin-left: -2px;
    }

    /* Header Specifics */
    .header-brand,
    .header-context,
    .header-nav,
    .header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .header-context {
        gap: 24px;
        margin-left: 32px;
    }

    .header-nav {
        gap: 4px;
        margin-left: auto;
    }

    .platform-mark {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, var(--accent-primary), var(--data-violet));
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .platform-title .title-main {
        font-size: 14px;
        font-weight: 600;
        display: block;
    }

    .platform-title .title-sub {
        font-size: 11px;
        color: var(--text-tertiary);
        display: block;
    }

    .firm-selector {
        background: var(--bg-secondary);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
    }

    .firm-selector:hover {
        background: var(--bg-tertiary);
    }

    .firm-selector .firm-name {
        font-size: 13px;
        font-weight: 500;
        margin-right: 8px;
    }

    .firm-selector .firm-id {
        font-size: 11px;
        font-family: var(--font-mono);
        color: var(--text-tertiary);
    }

    .action-btn {
        width: 36px;
        height: 36px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 8px;
        color: var(--text-secondary);
        cursor: pointer;
    }

    .action-btn:hover {
        background: var(--bg-secondary);
        color: var(--text-primary);
    }

    /* Workspace Controls */
    .breadcrumb {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .breadcrumb .crumb {
        font-size: 13px;
        color: var(--text-tertiary);
    }

    .breadcrumb .crumb.active {
        color: var(--text-primary);
        font-weight: 500;
    }

    .breadcrumb .separator {
        opacity: 0.5;
    }

    .workspace-controls {
        display: flex;
        gap: 8px;
    }

    .control-btn {
        padding: 6px 12px;
        font-size: 12px;
        background: var(--bg-secondary);
        border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .control-btn:hover {
        background: var(--bg-tertiary);
    }

    /* --- 4. Timeline (Footer) --- */
    .timeline-container {
        display: flex;
        align-items: center;
        gap: 24px;
        width: 100%;
    }

    .timeline-controls {
        display: flex;
        gap: 8px;
    }

    .tl-btn {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-secondary);
        border: 1px solid rgba(255, 255, 255, 0.06);
        font-size: 12px;
    }

    .tl-btn:hover {
        background: var(--bg-tertiary);
        color: var(--text-primary);
    }

    .tl-btn.play {
        width: 40px;
        background: var(--accent-primary);
        border-color: var(--accent-primary);
        color: var(--bg-void);
    }

    .timeline-track-main {
        flex: 1;
        position: relative;
        height: 40px;
    }

    .track-viewport {
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        transform: translateY(-50%);
        height: 8px;
        background: var(--bg-secondary);
        border-radius: 4px;
        cursor: pointer;
    }

    .track-progress {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 65%;
        background: linear-gradient(90deg, var(--accent-primary), var(--data-violet));
        border-radius: 4px;
    }

    .track-handle {
        position: absolute;
        top: 50%;
        left: 65%;
        transform: translate(-50%, -50%);
        width: 16px;
        height: 16px;
        background: var(--text-primary);
        border-radius: 50%;
        cursor: grab;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .current-year {
        font-size: 20px;
        font-weight: 700;
        font-family: var(--font-mono);
    }

    /* --- 5. Component Classes (Shared Fragments) --- */

    /* Base Cards (Consolidated) */
    .card-data,
    .founder-card,
    .product-card,
    .market-config-card,
    .tech-layer,
    .org-architecture {
        background: var(--bg-secondary);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 16px;
        /* Default spacing */
    }

    .card-data {
        transition: all 0.2s ease;
    }

    .card-data:hover {
        border-color: var(--accent-primary);
        box-shadow: 0 0 20px rgba(79, 158, 255, 0.15);
    }

    .section-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 16px;
    }

    .module-section {
        margin-bottom: 32px;
    }

    /* Genesis & Data Viz */
    .genesis-hero {
        position: relative;
        background: linear-gradient(135deg, rgba(79, 158, 255, 0.08) 0%, rgba(129, 140, 248, 0.04) 50%, rgba(167, 139, 250, 0.06) 100%);
        border: 1px solid rgba(79, 158, 255, 0.15);
        border-radius: 16px;
        padding: 32px;
        margin-bottom: 24px;
    }

    .genesis-year {
        font-size: 72px;
        font-weight: 700;
        font-family: var(--font-mono);
        color: var(--accent-primary);
        line-height: 1;
    }

    .genesis-date {
        font-size: 18px;
        color: var(--text-secondary);
        font-weight: 500;
    }

    .founders-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
    }

    .founder-card {
        display: flex;
        gap: 16px;
        margin-bottom: 0;
    }

    /* Override base card margin */
    .founder-avatar {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-elevated));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 700;
        color: var(--accent-primary);
        flex-shrink: 0;
    }

    .strategic-intent-card {
        background: var(--bg-secondary);
        border-left: 3px solid var(--data-amber);
        border-radius: 0 12px 12px 0;
        padding: 24px;
    }

    .intent-quote {
        font-size: 17px;
        font-style: italic;
        color: var(--text-secondary);
        line-height: 1.7;
        margin-bottom: 16px;
    }

    .market-config-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
    }

    .config-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 12px;
        display: block;
    }

    .config-value {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 8px;
    }

    /* Tech Timeline */
    .tech-system-timeline {
        position: relative;
        padding-left: 32px;
    }

    .tech-system-timeline::before {
        content: '';
        position: absolute;
        left: 8px;
        top: 0;
        bottom: 0;
        width: 2px;
        background: linear-gradient(180deg, var(--accent-primary), var(--data-violet));
    }

    .tech-layer {
        position: relative;
    }

    .tech-layer::before {
        content: '';
        position: absolute;
        left: -28px;
        top: 24px;
        width: 12px;
        height: 12px;
        background: var(--accent-primary);
        border: 3px solid var(--bg-void);
        border-radius: 50%;
    }

    .tech-specs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
    }

    .tech-spec {
        padding: 12px;
        background: var(--bg-tertiary);
        border-radius: 8px;
    }

    /* Product & Org */
    .product-portfolio-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 16px;
    }

    .product-card {
        transition: all 0.2s ease;
    }

    .product-card:hover {
        border-color: var(--accent-primary);
        transform: translateY(-2px);
    }

    .org-header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        margin-bottom: 20px;
    }

    .org-metric-value {
        font-size: 24px;
        font-weight: 700;
        font-family: var(--font-mono);
    }

    .org-units {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .org-unit {
        padding: 8px 14px;
        background: var(--bg-tertiary);
        border-radius: 6px;
        font-size: 12px;
        color: var(--text-secondary);
    }

    .org-unit.primary {
        background: rgba(79, 158, 255, 0.15);
        color: var(--accent-primary);
    }

    /* --- 6. Utilities --- */
    .text-muted {
        color: var(--text-tertiary);
    }

    .text-secondary {
        color: var(--text-secondary);
    }

    .text-accent {
        color: var(--accent-primary);
    }

    .flex {
        display: flex;
    }

    .items-center {
        align-items: center;
    }

    .gap-2 {
        gap: 8px;
    }

    .gap-4 {
        gap: 16px;
    }

    /* --- 7. Scrollbars & Responsive --- */
    ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
    }

    ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
        background: var(--bg-elevated);
        border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: var(--bg-hover);
    }

    @media (max-width: 1024px) {

        .market-config-grid,
        .capital-sources-grid {
            grid-template-columns: 1fr;
        }
    }

    @media (max-width: 768px) {
        .intel-canvas {
            grid-template-columns: 1fr;
        }

        .nav-rail {
            display: none;
        }
    }

    @media (prefers-reduced-motion: reduce) {

        *,
        *::before,
        *::after {
            animation-duration: 0.01ms !important;
            transition-duration: 0.01ms !important;
        }
    }
</style>

<body class="platform-shell">

    <!-- Header -->
    <header class="intel-header">
        <div class="header-brand">
            <div class="platform-mark">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2" />
                    <line x1="12" y1="22" x2="12" y2="15.5" />
                    <polyline points="22 8.5 12 15.5 2 8.5" />
                </svg>
            </div>
            <div class="platform-title">
                <span class="title-main">Firm Intelligence</span>
                <span class="title-sub">Structural Analysis Platform</span>
            </div>
        </div>

        <div class="header-context">
            <div class="firm-selector" id="firmSelector">
                <span class="firm-name">Acme Industries</span>
                <span class="firm-id">ACM-2024</span>
            </div>

            <div class="temporal-context">
                <span class="temporal-mode">Analysis Period</span>
                <div class="temporal-range">
                    <span class="range-start">1998</span>
                    <span class="range-divider">—</span>
                    <span class="range-end">2024</span>
                </div>
            </div>
        </div>

        <nav class="header-nav">
            <button class="nav-item active" data-section="firm">Firm</button>
            <button class="nav-item" data-section="environment">Environment</button>
            <button class="nav-item" data-section="interaction">Interaction</button>
            <button class="nav-item" data-section="comparative">Comparative</button>
        </nav>

        <div class="header-actions">
            <button class="action-btn" aria-label="Export data">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                    <polyline points="7 10 12 15 17 10" />
                    <line x1="12" y1="15" x2="12" y2="3" />
                </svg>
            </button>
            <button class="action-btn" aria-label="Settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3" />
                    <path d="M12 1v6m0 6v10M1 12h6m6 0h10" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Canvas -->
    <main class="intel-canvas">

        <!-- Navigation Rail -->
        <aside class="nav-rail">
            <nav class="nav-tree" id="navTree"></nav>
        </aside>

        <!-- Workspace -->
        <section class="workspace">
            <div class="workspace-header">
                <div class="breadcrumb">
                    <span class="crumb">Firm</span>
                    <span class="separator">/</span>
                    <span class="crumb active" id="breadcrumbActive">Overview</span>
                </div>
                <div class="workspace-controls">
                    <button class="control-btn">Compare</button>
                    <button class="control-btn">Export</button>
                    <button class="control-btn">Share</button>
                </div>
            </div>

            <!-- Fragment Injection Point -->
            <div class="workspace-content" id="workspaceContent">
                <!-- Fragments will be injected here -->
            </div>
        </section>

    </main>

    <!-- Footer Timeline -->
    <footer class="temporal-bar">
        <div class="timeline-container">
            <div class="timeline-controls">
                <button class="tl-btn" aria-label="Previous">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="19 20 9 12 19 4 19 20" />
                        <line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2" />
                    </svg>
                </button>
                <button class="tl-btn play" aria-label="Play timeline">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5 3 19 12 5 21 5 3" />
                    </svg>
                </button>
                <button class="tl-btn" aria-label="Next">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5 4 15 12 5 20 5 4" />
                        <line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2" />
                    </svg>
                </button>
            </div>
            <div class="timeline-track-main">
                <div class="track-viewport" id="timelineTrack">
                    <div class="track-progress"></div>
                    <div class="track-handle" id="timelineHandle"></div>
                </div>
            </div>
            <div class="timeline-info">
                <span class="current-year" id="currentYear">2024</span>
            </div>
        </div>
    </footer>

                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a15 15 0 0 1 0 20M12 2a15 15 0 0 0 0 20M2 12h20"/></svg>`,
                children: [
                    { id: 'industry', label: 'Industry Profile' },
                    { id: 'markets', label: 'Market Profile' },
                    { id: 'value-chain', label: 'Value Chain' },
                    { id: 'tech-landscape', label: 'Tech Landscape' },
                    { id: 'regulatory', label: 'Regulatory' }
                ]
            },
            {
                id: 'interaction',
                label: 'Interaction',
                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M4 12h16M12 4v16"/></svg>`,
                children: [
                    { id: 'sales', label: 'Sales Evolution' },
                    { id: 'competitive', label: 'Competitive Position' },
                    { id: 'market-share', label: 'Market Share' },
                    { id: 'profitability', label: 'Profitability' }
                ]
            }
        ];

        // --- State ---
        let currentView = 'overview';

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            renderNavigation();
            loadFragment(currentView); // Load default view
            initializeTimeline();
            initializeAnimations();
        });

        // --- Navigation Logic ---
        function renderNavigation() {
            const navTree = document.getElementById('navTree');

            navTree.innerHTML = navigationData.map(domain => `
        <div class="tree-domain ${domain.id === 'firm-state' ? 'expanded' : ''}" data-domain="${domain.id}">
          <button class="domain-header" onclick="toggleDomain('${domain.id}')">
            <span class="domain-icon">${domain.icon}</span>
            <span class="domain-label">${domain.label}</span>
            <span class="domain-badge">${domain.children.length}</span>
            <svg class="expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
          <ul class="domain-children">
            ${domain.children.map(child => `
              <li class="nav-leaf ${child.id === currentView ? 'active' : ''}" 
                  data-view="${child.id}" 
                  onclick="navigateTo('${child.id}', '${child.label}')">
                <span class="leaf-label">${child.label}</span>
              </li>
            `).join('')}
          </ul>
        </div>
      `).join('');
        }

        function toggleDomain(domainId) {
            const domain = document.querySelector(`[data-domain="${domainId}"]`);
            domain.classList.toggle('expanded');
        }

        function navigateTo(viewId, label) {
            currentView = viewId;

            // Update Nav Active State
            document.querySelectorAll('.nav-leaf').forEach(leaf => {
                leaf.classList.toggle('active', leaf.dataset.view === viewId);
            });

            // Update Breadcrumb
            document.getElementById('breadcrumbActive').textContent = label;

            // Load Content
            loadFragment(viewId);
        }

        // --- Fragment Loader ---
        async function loadFragment(section) {
            const container = document.getElementById('workspaceContent');

            try {
                // Attempt to fetch the external fragment
                const response = await fetch(`section/${section}.html`);
                if (!response.ok) throw new Error('Fragment not found');

                const html = await response.text();
                container.innerHTML = html;

                // Re-initialize animations for new content
                initializeAnimations();

            } catch (error) {
                console.warn(`Could not load section/${section}.html:`, error);

                // Fallback content if file is missing
                container.innerHTML = `
          <section class="intel-module active">
            <div class="module-section">
              <div style="padding: 40px; text-align: center; background: var(--bg-secondary); border-radius: 12px; border: 1px dashed rgba(255,255,255,0.1);">
                <h3 style="color: var(--text-primary); margin-bottom: 8px;">Fragment Missing</h3>
                <p style="color: var(--text-tertiary); font-size: 13px;">
                  Could not load <code style="background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px;">fragments/${section}.html</code>.
                </p>
              </div>
            </div>
          </section>
        `;
            }
        }

        // --- Timeline Logic ---
        function initializeTimeline() {
            const track = document.getElementById('timelineTrack');
            const handle = document.getElementById('timelineHandle');
            let isDragging = false;

            handle.addEventListener('mousedown', () => { isDragging = true; });
            document.addEventListener('mouseup', () => { isDragging = false; });

            track.addEventListener('click', (e) => {
                const rect = track.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                updateTimelinePosition(percent);
            });

            track.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const rect = track.getBoundingClientRect();
                    const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                    updateTimelinePosition(percent);
                }
            });
        }

        function updateTimelinePosition(percent) {
            const progress = document.querySelector('.track-progress');
            const handle = document.getElementById('timelineHandle');
            const yearDisplay = document.getElementById('currentYear');

            const startYear = 1998;
            const endYear = 2024;
            const currentYear = Math.round(startYear + percent * (endYear - startYear));

            progress.style.width = `${percent * 100}%`;
            handle.style.left = `${percent * 100}%`;
            yearDisplay.textContent = currentYear;
        }

        // --- Animations ---
        function initializeAnimations() {
            const cards = document.querySelectorAll('.metric-card, .category-card, .founder-card, .product-card, .card-data');
            cards.forEach((card, i) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, i * 60);
            });
        }

        // --- Header Navigation Events ---
        document.querySelectorAll('.header-nav .nav-item').forEach(item => {
            item.addEventListener('click', function () {
                document.querySelectorAll('.header-nav .nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>

</html>
